name: SauceDemo Automation CI

on:
  push:
    branches: ["**"]          # triggers on every commit to any branch
  pull_request:
    branches: ["**"]
  schedule:
    - cron: '30 18 * * *'     # 00:00 IST = 18:30 UTC

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java setup ──────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ── 3. Node.js setup (required for Allure 3 CLI) ───────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Install Allure 3 CLI ────────────────────────────────────────────
      - name: Install Allure 3
        run: npm install -g allure@latest

      # ── 5. Maven cache ─────────────────────────────────────────────────────
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # ── 6. Run tests ───────────────────────────────────────────────────────
      - name: Run tests
        run: mvn clean test -q
        continue-on-error: true   # let report generate even if tests fail

      # ── 7. Fetch Allure history from gh-pages ──────────────────────────────
      - name: Fetch Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true   # first run: gh-pages doesn't exist yet
        with:
          ref: gh-pages
          path: gh-pages

      # ── 8. Copy history into results (for trend data) ─────────────────────
      - name: Restore Allure history
        if: always()
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history target/allure-results/history
            echo "History restored from gh-pages"
          else
            echo "No previous history found, skipping"
          fi

      - name: Install Allure 3
        run: |
          npm install -g allure@latest
          allure --version

      # ── 9. Generate Allure 3 report ────────────────────────────────────────
      - name: Generate Allure 3 report
        if: always()
        run: |
          allure generate --output allure-report target/allure-results
          echo "Allure 3 report generated at: allure-report/"
          ls -la allure-report/

      # ── 10. Deploy to GitHub Pages ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          commit_message: "ci: Allure 3 report [${{ github.run_number }}] — ${{ github.event_name }}"

      # ── 11. Print report URL ───────────────────────────────────────────────
      - name: Report URL
        if: always()
        run: |
          echo "✅ Allure 3 report published:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
