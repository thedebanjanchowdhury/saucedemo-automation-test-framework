name: SauceDemo Automation CI

on:
  push:
    branches: ["**"]          # triggers on every commit to any branch
  pull_request:
    branches: ["**"]
  schedule:
    - cron: '30 18 * * *'     # 00:00 IST = 18:30 UTC (IST is UTC+5:30)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java setup ──────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ── 3. Maven cache ─────────────────────────────────────────────────────
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # ── 4. Run tests ───────────────────────────────────────────────────────
      - name: Run tests
        run: mvn clean test -q
        continue-on-error: true   # let report generate even if tests fail

      # ── 5. Fetch Allure history from gh-pages ──────────────────────────────
      - name: Fetch Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true   # first run: gh-pages doesn't exist yet
        with:
          ref: gh-pages
          path: gh-pages

      # ── 6. Build Allure report ─────────────────────────────────────────────
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 30          # keep last 30 runs in trend chart

      # ── 7. Publish to GitHub Pages ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          commit_message: "ci: publish Allure report [${{ github.run_number }}] — ${{ github.event_name }}"

      # ── 8. Print report URL ────────────────────────────────────────────────
      - name: Report URL
        if: always()
        run: |
          echo "✅ Allure report published:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
